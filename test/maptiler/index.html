<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Vector Tiles in Leaflet JS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="maptiler-sdk.umd.min.js"></script>
    <link href="maptiler-sdk.css" rel="stylesheet" />
    <script src="leaflet-maptilersdk.umd.min.js"></script>
    <style>
        #map {position: absolute; top: 0; right: 0; bottom: 0; left: 0;}
    </style>
</head>
<body>
<div id="map"></div>
<script>
    const map = L.map('map').setView([46.4675989,10.3603752], 13);
    const mtLayer = L.maptiler.maptilerLayer({
        apiKey: 'pMmyZojmlgCP6M0zNE1l',
        style: L.maptiler.MapStyle.TOPO, //optional
    }).addTo(map);
</script>
</body>
</html>
